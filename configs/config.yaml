# ============================================
# PROJECT CONFIGURATION
# ============================================

# Project Info
project:
  name: "DRL Trading Agent with Sentiment Analysis"
  version: "2.0.0"

# ============================================
# DATA SETTINGS
# ============================================
data:
  ticker: "AAPL"
  start_date: "2019-01-01"
  end_date: "2024-12-01"

# File Paths
paths:
  raw_prices: "data/raw/prices.csv"
  raw_news: "data/raw/news.csv"
  technical_features: "data/processed/technical_features.csv"
  sentiment_scores: "data/processed/sentiment_scores.csv"
  combined_features: "data/processed/combined_features.csv"
  models_dir: "models/saved"
  results_dir: "results"
  plots_dir: "results/plots"

# ============================================
# FEATURE ENGINEERING
# ============================================

# Technical Indicators
technical:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  sma_short: 20
  sma_long: 50
  volatility_short: 20
  volatility_long: 60
  bb_period: 20
  atr_period: 14

# Regime Detection
regime:
  volatility_threshold: 1.5
  trend_threshold: 0.3
  lookback: 20

# Sentiment Analysis
sentiment:
  model_name: "ProsusAI/finbert"
  max_length: 512
  batch_size: 16
  aggregation: "mean"

# ============================================
# TRADING ENVIRONMENT
# ============================================
environment:
  initial_balance: 10000
  transaction_cost: 0.001
  max_steps: null

# ============================================
# HIERARCHICAL PPO SETTINGS
# ============================================

# PPO Hyperparameters
ppo:
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 64
  n_epochs: 10
  total_timesteps_quick: 50000
  total_timesteps_full: 200000

# Network Architecture
network:
  hidden_dim: 128
  attention_dim: 64
  n_layers: 2

# Hierarchical Modifications
hierarchical:
  commitment_options:
    - 1
    - 3
    - 5
    - 10
  n_macro_actions: 6
  macro_actions:
    - "EXIT"
    - "HOLD"
    - "AGGRESSIVE_LONG"
    - "CONSERVATIVE_LONG"
    - "TREND_FOLLOW"
    - "MEAN_REVERT"

# ============================================
# DQN SETTINGS (NEW — for algorithm comparison)
# ============================================
dqn:
  learning_rate: 0.0001
  gamma: 0.99
  buffer_size: 50000
  learning_starts: 1000
  batch_size: 64
  tau: 0.005
  train_freq: 4
  target_update_interval: 1000
  exploration_fraction: 0.1
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.02
  total_timesteps_quick: 50000
  total_timesteps_full: 200000
  net_arch:
    - 256
    - 128
    - 64

# ============================================
# WALK-FORWARD VALIDATION (NEW)
# ============================================
walk_forward:
  enabled: true
  n_folds: 3
  test_window_days: 252        # ~1 trading year per fold
  min_train_days: 504          # ~2 trading years minimum
  expanding: true              # true = expanding window, false = rolling window
  retrain_per_fold: true       # train fresh model each fold

# ============================================
# EVALUATION SETTINGS
# ============================================
validation:
  train_days: 504
  val_days: 126
  test_days: 126
  n_eval_episodes: 10

# Metrics to Calculate
metrics:
  - "total_return"
  - "annualized_return"
  - "sharpe_ratio"
  - "sortino_ratio"
  - "calmar_ratio"
  - "max_drawdown"
  - "win_rate"
  - "profit_factor"
  - "trade_count"
  - "avg_trade_duration"

# ============================================
# STATISTICAL TESTING (NEW)
# ============================================
statistical_tests:
  enabled: true
  tests:
    - "paired_t_test"
    - "wilcoxon_signed_rank"
    - "sharpe_equality"
    - "bootstrap_sharpe"
  bootstrap_samples: 10000
  confidence_level: 0.95
  significance_level: 0.05

# ============================================
# EXPERIMENT SETTINGS (NEW)
# ============================================
experiment:
  # Which agents to train and compare
  agents:
    - "ppo_sentiment"          # PPO with sentiment + attention
    - "ppo_baseline"           # PPO without sentiment
    - "dqn_sentiment"          # DQN with sentiment
    - "dqn_baseline"           # DQN without sentiment
    - "buy_and_hold"           # Passive benchmark

  # Modes
  modes:
    quick:
      timesteps: 50000
      walk_forward_folds: 2
      description: "Fast sanity check (~10 min)"
    full:
      timesteps: 200000
      walk_forward_folds: 3
      description: "Full experiment (~60 min)"
    extensive:
      timesteps: 500000
      walk_forward_folds: 5
      description: "Publication-quality (~3 hrs)"

# ============================================
# GENERAL SETTINGS
# ============================================
seed: 42
device: "auto"
verbose: 1
save_freq: 10000

# ============================================
# EXECUTION MODEL (NEW)
# ============================================
execution:
  slippage_model: "proportional"    # "none", "fixed", or "proportional"
  slippage_base_bps: 5.0            # Base slippage: 5 basis points = 0.05%
  spread_bps: 2.0                   # Half-spread: 2 basis points = 0.02%
  volatility_slippage_mult: 1.0     # How much vol amplifies slippage
  
  # Realistic values by asset type:
  # Large-cap stocks (AAPL, MSFT):  slippage=3-5bps, spread=1-2bps
  # Mid-cap stocks:                 slippage=5-10bps, spread=3-5bps
  # Small-cap stocks:               slippage=10-20bps, spread=5-15bps
  # High volatility periods:        multiply by 2-3x
  # ============================================
# NEWS DATA SOURCES (NEW)
# ============================================
news_sources:
  finnhub_key_env: "FINNHUB_API_KEY"     # env variable name
  newsapi_key_env: "NEWSAPI_KEY"         # env variable name
  
  # Fallback behavior when no API keys are set
  use_kaggle: true                        # try Kaggle dataset
  use_generated: false                    # DO NOT use synthetic (the whole point)
  kaggle_path: "data/raw/raw_analyst_ratings.csv"