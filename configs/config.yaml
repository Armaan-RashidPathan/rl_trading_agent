# ============================================
# PROJECT CONFIGURATION
# ============================================

# Project Info
project:
  name: "DRL Trading Agent with Sentiment Analysis"
  version: "1.0.0"

# ============================================
# DATA SETTINGS
# ============================================
data:
  ticker: "AAPL"
  start_date: "2019-01-01"
  end_date: "2024-12-01"

# File Paths
paths:
  raw_prices: "data/raw/prices.csv"
  raw_news: "data/raw/news.csv"
  technical_features: "data/processed/technical_features.csv"
  sentiment_scores: "data/processed/sentiment_scores.csv"
  combined_features: "data/processed/combined_features.csv"

# ============================================
# FEATURE ENGINEERING
# ============================================

# Technical Indicators
technical:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  sma_short: 20
  sma_long: 50
  volatility_short: 20
  volatility_long: 60
  bb_period: 20
  atr_period: 14

# Regime Detection
regime:
  volatility_threshold: 1.5
  trend_threshold: 0.3
  lookback: 20

# Sentiment Analysis
sentiment:
  model_name: "ProsusAI/finbert"
  max_length: 512
  batch_size: 16
  aggregation: "mean"

# ============================================
# TRADING ENVIRONMENT
# ============================================
environment:
  initial_balance: 10000
  transaction_cost: 0.001
  max_steps: null

# ============================================
# HIERARCHICAL PPO SETTINGS
# ============================================

# PPO Hyperparameters
ppo:
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 64
  n_epochs: 10
  total_timesteps: 50000

# Network Architecture
network:
  hidden_dim: 128
  attention_dim: 64
  n_layers: 2

# Hierarchical Modifications
hierarchical:
  commitment_options:
    - 1
    - 3
    - 5
    - 10
  n_macro_actions: 6
  macro_actions:
    - "EXIT"
    - "HOLD"
    - "AGGRESSIVE_LONG"
    - "CONSERVATIVE_LONG"
    - "TREND_FOLLOW"
    - "MEAN_REVERT"

# ============================================
# EVALUATION SETTINGS
# ============================================
validation:
  train_days: 504
  val_days: 126
  test_days: 126
  n_eval_episodes: 10

# Metrics to Calculate
metrics:
  - "total_return"
  - "annualized_return"
  - "sharpe_ratio"
  - "sortino_ratio"
  - "max_drawdown"
  - "win_rate"
  - "profit_factor"
  - "trade_count"

# ============================================
# GENERAL SETTINGS
# ============================================
seed: 42
device: "auto"
verbose: 1
save_freq: 10000